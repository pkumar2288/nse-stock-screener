name: NSE Stock Screener

on:
  schedule:
    - cron: '45 3 * * 1-5'      # 9:15 AM IST
    - cron: '45 4 * * 1-5'      # 10:15 AM IST
    - cron: '45 6 * * 1-5'      # 12:15 PM IST
    - cron: '45 9 * * 1-5'      # 3:15 PM IST
    - cron: '0 15 * * 1-5'      # 8:30 PM IST
  
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (test with fewer stocks)'
        type: boolean
        default: true

jobs:
  run-screener:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Debug - List all files
      run: |
        echo "Current directory: $(pwd)"
        echo "All files in repository:"
        ls -la
        echo ""
        echo "Looking for Python files:"
        find . -name "*.py" -type f
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance openpyxl requests
    
    - name: Run screener
      env:
        RUN_MODE: cloud
        TZ: Asia/Kolkata
      run: |
        # Try to find and run the correct Python file
        if [ -f "screener.py" ]; then
          echo "Running screener.py"
          python screener.py --dry-run
        elif [ -f "nse_screener.py" ]; then
          echo "Running nse_screener.py"
          python nse_screener.py --dry-run
        elif [ -f "NSE_SCREENERV1.0.py" ]; then
          echo "Running NSE_SCREENERV1.0.py"
          python NSE_SCREENERV1.0.py --dry-run
        else
          echo "ERROR: No Python file found!"
          echo "Available files:"
          ls -la
          exit 1
        fi
