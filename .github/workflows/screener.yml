on:
  schedule:
    - cron: '45 3 * * 1-5'   # 9:15 AM IST
    - cron: '45 4 * * 1-5'   # 10:15 AM IST
    - cron: '45 6 * * 1-5'   # 12:15 PM IST
    - cron: '30 9 * * 1-5'   # 3:00 PM IST
    - cron: '0 15 * * 1-5'   # 8:30 PM IST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode'
        type: boolean
        default: false        # changed: scheduled runs are production
      symbols:
        description: 'Specific symbols (comma-separated)'
        type: string
        default: ''

    - name: Run screener
      env:
        RUN_MODE: cloud
        TZ: Asia/Kolkata
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PYTHONPATH: ${{ github.workspace }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      working-directory: ./src
      run: |
        DRY_RUN_ARG=""
        SYMBOLS_ARG=""
        [ "$DRY_RUN" = "true" ] && DRY_RUN_ARG="--dry-run"
        [ -n "${{ github.event.inputs.symbols }}" ] && \
          SYMBOLS_ARG="--symbols $(echo '${{ github.event.inputs.symbols }}' | tr ',' ' ')"
        python screener.py $DRY_RUN_ARG $SYMBOLS_ARG
