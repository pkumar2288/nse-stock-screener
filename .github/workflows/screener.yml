name: NSE Stock Screener

on:
  schedule:
    - cron: '45 3 * * 1-5'      # 9:15 AM IST
    - cron: '45 4 * * 1-5'      # 10:15 AM IST
    - cron: '45 6 * * 1-5'      # 12:15 PM IST
    - cron: '30 9 * * 1-5'      # 3:00 PM IST
    - cron: '0 15 * * 1-5'      # 8:30 PM IST
  
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (test with fewer stocks)'
        type: boolean
        default: true

jobs:
  run-screener:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pandas numpy yfinance openpyxl requests
    
    - name: Run screener
      env:
        RUN_MODE: cloud
        TZ: Asia/Kolkata
      run: |
        python nse_screener.py --dry-run ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
